model_name: TinyLlama/TinyLlama-1.1B-Chat-v1.0
dataset_train: data/helpdesk/train.jsonl
dataset_eval: data/helpdesk/eval.jsonl
output_dir: outputs/helpdesk-qlora

max_seq_length: 768
num_train_epochs: 2
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 0.0002
warmup_steps: 1
logging_steps: 5
eval_steps: 25
save_steps: 25

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

seed: 42
